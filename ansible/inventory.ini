# ─────────────────────────────────────────────────────
# inventory.ini
# Update EC2 IP after: terraform output ec2_public_ip
# ─────────────────────────────────────────────────────

[backend]
backend-server ansible_host=<EC2_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[backend:vars]
ansible_python_interpreter=/usr/bin/python3
